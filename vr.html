<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>VR</title>

    <link rel="shortcut icon" href="img/ChatGPT Image 2026. márc. 4. 08_33_52.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* NAVBAR */

nav{
    width:100%;
    padding:20px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#38bdf8;
}

/* HERO */

.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

.hero h1{
    font-size:65px;
    margin-bottom:20px;
    color:#38bdf8;
}

.hero p{
    font-size:22px;
    max-width:700px;
    margin-bottom:30px;
}

.hero button{
    padding:15px 35px;
    border:none;
    background:#38bdf8;
    color:black;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover{
    transform:scale(1.05);
}

/* PRODUCTS */

.products{
    padding:80px 20px;
    text-align:center;
}

.products h2{
    font-size:40px;
    margin-bottom:50px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    width:280px;
    padding:25px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card h3{
    margin-bottom:15px;
    color:#38bdf8;
}

.card p{
    margin-bottom:20px;
    color:white;
}

.card button{
    padding:10px 20px;
    border:none;
    background:#38bdf8;
    border-radius:8px;
    cursor:pointer;
}

/* BACK BUTTON */

.back-btn{
    display:flex;
    justify-content:center;
    margin:40px 0;
}

.btn-tech{
    background:#38bdf8;
    border:none;
    color:black;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
    text-decoration:none;
}

.btn-tech:hover{
    background:#0ea5e9;
    transform:scale(1.05);
}

/* FOOTER */

footer{
    padding:30px;
    text-align:center;
    background:aqua
    margin-top:50px;
}

/* MODAL DARK BACKDROP */

.modal-backdrop.show{
    background:aquaC;
    opacity:1 !important;
}

/* COPYRIGHT */

.copyright{
    color: white;
}

</style>

</head>
<body>
    <h1>VR</h1>
    <h3>Ha egy jó szórakozó helyet keresel magadnak és szüleidnek egyaránt akkor itt a helyed hiszen a VR Vidámpark felnőtteknek is meg a gyerekeknek is ad egy lehetőséget kipróbálni a VR-os játékokat például: Beat Saber , Fruit Ninja stb.</h3>
    <img src="img/Vr/Vr-idámpark.png">

    <!-- FOOTER -->
<footer class="text-center mt-5 p-3">
    <p class="small text-muted">
        © 2026 • Kandó • Oktatási projekt
    </p>
</footer>
<a href="index.html">Vissza a Főoldalra</a>
</body>
</html>
